AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Hospedagem do frontend (SPA React) da Clínica de Pilates.
  Bucket S3 privado + CloudFront (Origin Access Control), HTTPS via *.cloudfront.net.
  Stack separado do backend (clinica-pilates) — ciclos de vida independentes.

Resources:
  # Bucket privado: nada de acesso público direto; só o CloudFront lê (via OAC).
  SiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  OAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: Clinica de Pilates - frontend demo
        DefaultRootObject: index.html
        PriceClass: PriceClass_All # inclui borda de São Paulo (baixa latência no BR)
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt SiteBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt OAC.Id
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          Compress: true
          # Managed "CachingOptimized"
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
        # SPA: caminhos inexistentes voltam o index.html (200)
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

  # Permite ao CloudFront (desta distribuição) ler os objetos do bucket.
  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SiteBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${SiteBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${Distribution.Id}"

Outputs:
  BucketName:
    Description: Nome do bucket S3 do site
    Value: !Ref SiteBucket
  DistributionId:
    Description: ID da distribuição CloudFront (para invalidação)
    Value: !Ref Distribution
  SiteUrl:
    Description: URL pública HTTPS do site
    Value: !Sub "https://${Distribution.DomainName}"
