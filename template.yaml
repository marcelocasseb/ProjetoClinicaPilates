AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Clínica de Pilates — infraestrutura base serverless.
  Lambda (FastAPI + Mangum) + API Gateway HTTP (proxy) + DynamoDB on-demand.

Globals:
  Function:
    Timeout: 15
    MemorySize: 256
    Runtime: python3.13

Resources:
  # --- API Gateway HTTP com CORS (T4) ---
  ClinicaHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowHeaders:
          - '*'
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS

  # --- Função Lambda única com roteamento interno (T4) ---
  ClinicaApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: app.handler.handler
      Environment:
        Variables:
          TABLE_NAME: !Ref ClinicaTable        # nome da tabela injetado (T5 / INFRA-06)
      Policies:
        # Menor privilégio: CRUD apenas nesta tabela (T5 / INFRA-06)
        - DynamoDBCrudPolicy:
            TableName: !Ref ClinicaTable
      Events:
        Root:
          Type: HttpApi
          Properties:
            ApiId: !Ref ClinicaHttpApi
            Path: /
            Method: ANY
        Proxy:
          Type: HttpApi
          Properties:
            ApiId: !Ref ClinicaHttpApi
            Path: /{proxy+}
            Method: ANY

  # --- Tabela DynamoDB single-table on-demand (T5 / AD-005) ---
  # Multi-tenant (AD-007): PK = CLINIC#<clinicId>#CLIENT#<clientId>, SK = PROFILE.
  # GSI1 lista os pacientes de uma clínica (GSI1PK = CLINIC#<clinicId>), índice
  # esparso — só itens de perfil têm GSI1PK/GSI1SK.
  ClinicaTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

Outputs:
  ApiBaseUrl:
    Description: URL base do API Gateway HTTP
    Value: !Sub 'https://${ClinicaHttpApi}.execute-api.${AWS::Region}.amazonaws.com'
  TableName:
    Description: Nome da tabela DynamoDB
    Value: !Ref ClinicaTable
  FunctionName:
    Description: Nome da função Lambda
    Value: !Ref ClinicaApiFunction
